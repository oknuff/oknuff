<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enhanced Eid Card Maker</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@700;900&family=Tajawal:wght@700;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Tajawal', sans-serif;
  background:#0D2818;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
  color:white;
}

/* Controls */
.controls{
  max-width:500px;
  width:100%;
  margin-bottom:20px;
}

.control-group{
  margin-bottom:15px;
}

label{
  display:block;
  margin-bottom:5px;
  font-weight:bold;
  color:#C9A84C;
}

input, textarea, select{
  width:100%;
  margin:8px 0;
  padding:12px;
  border-radius:8px;
  border:2px solid #C9A84C;
  background:rgba(201, 168, 76, 0.1);
  color:white;
  font-family:inherit;
  font-size:14px;
}

input::placeholder, textarea::placeholder{
  color:rgba(255, 255, 255, 0.6);
}

select option{
  background:#0D2818;
  color:white;
}

button{
  width:100%;
  padding:16px;
  background:linear-gradient(135deg, #C9A84C, #E8C97A);
  border:none;
  font-weight:900;
  cursor:pointer;
  border-radius:8px;
  font-size:16px;
  color:#0D2818;
  transition:all 0.3s ease;
  margin-top:10px;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(201, 168, 76, 0.3);
}

/* Card */
#card{
  width:640px;
  max-width:100%;
  height:400px;
  border-radius:16px;
  background:linear-gradient(135deg,#0d3b2e,#1e7a5e);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.6);
  position:relative;
  overflow:hidden;
}

/* Islamic Pattern Overlay */
#card::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background-image: 
    radial-gradient(circle at 20% 20%, rgba(201, 168, 76, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(232, 201, 122, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(201, 168, 76, 0.05) 0%, transparent 70%);
  pointer-events:none;
}

.title{
  font-family:'Cairo', sans-serif;
  font-size:48px;
  color:#C9A84C;
  font-weight:900;
  text-shadow:2px 2px 4px rgba(0,0,0,0.5);
  z-index:1;
}

.sub{
  font-family:'Amiri', serif;
  font-size:28px;
  color:#E8C97A;
  font-weight:700;
  z-index:1;
}

.name{
  margin-top:15px;
  font-size:28px;
  font-weight:700;
  z-index:1;
}

.msg{
  margin-top:15px;
  font-size:20px;
  font-weight:500;
  z-index:1;
}

/* Background styles */
.bg-fitr{
  background:linear-gradient(135deg,#0d3b2e,#1e7a5e);
}

.bg-adha{
  background:linear-gradient(135deg,#8B4513,#CD853F);
}

.bg-ramadan{
  background:linear-gradient(135deg,#1a237e,#3949ab);
}
</style>
</head>

<body>

<div class="controls">
  <div class="control-group">
    <label for="eidType">Eid Type:</label>
    <select id="eidType" onchange="update()">
      <option value="fitr">Eid ul-Fitr</option>
      <option value="adha">Eid ul-Adha</option>
    </select>
  </div>

  <div class="control-group">
    <label for="background">Background Style:</label>
    <select id="background" onchange="update()">
      <option value="fitr">Eid ul-Fitr Green</option>
      <option value="adha">Eid ul-Adha Gold</option>
      <option value="ramadan">Ramadan Blue</option>
    </select>
  </div>

  <div class="control-group">
    <label for="name">Recipient Name:</label>
    <input id="name" value="Dear Fatima" oninput="update()" placeholder="Enter recipient name">
  </div>

  <div class="control-group">
    <label for="msg">Message:</label>
    <textarea id="msg" oninput="update()" rows="3" placeholder="Enter your Eid message">May this Eid bring peace and joy!</textarea>
  </div>

  <button onclick="download()">⬇ Download Card</button>
  <button onclick="showImageDirectly()">🖼️ View & Save Image</button>
  <button onclick="copyImageToClipboard()">📋 Copy to Clipboard</button>
</div>

<div id="card" class="bg-fitr">
  <div class="sub" id="arabic">عيد مبارك</div>
  <div class="title" id="title">Eid ul-Fitr</div>
  <div class="sub" id="subtitle">MUBARAK</div>
  <div class="name" id="cname">Dear Fatima</div>
  <div class="msg" id="cmsg">May this Eid bring peace and joy!</div>
</div>

<script>
function update(){
  const eidType = document.getElementById('eidType').value;
  const background = document.getElementById('background').value;
  const card = document.getElementById('card');
  
  // Update card content based on Eid type
  if(eidType === 'fitr'){
    document.getElementById('arabic').innerText = 'عيد مبارك';
    document.getElementById('title').innerText = 'Eid ul-Fitr';
    document.getElementById('subtitle').innerText = 'MUBARAK';
  } else if(eidType === 'adha'){
    document.getElementById('arabic').innerText = 'عيد الأضحى';
    document.getElementById('title').innerText = 'Eid ul-Adha';
    document.getElementById('subtitle').innerText = 'MUBARAK';
  }
  
  // Update background
  card.className = `bg-${background}`;
  
  // Update name and message
  document.getElementById('cname').innerText = document.getElementById('name').value;
  document.getElementById('cmsg').innerText = document.getElementById('msg').value;
}

/* Canvas renderer */
async function render(){
  const canvas=document.createElement('canvas');
  canvas.width=1280;
  canvas.height=800;
  const ctx=canvas.getContext('2d');

  const eidType = document.getElementById('eidType').value;
  const background = document.getElementById('background').value;
  
  // Set background gradient based on selection
  let grad;
  if(background === 'fitr'){
    grad = ctx.createLinearGradient(0,0,1280,800);
    grad.addColorStop(0,'#0d3b2e');
    grad.addColorStop(1,'#1e7a5e');
  } else if(background === 'adha'){
    grad = ctx.createLinearGradient(0,0,1280,800);
    grad.addColorStop(0,'#8B4513');
    grad.addColorStop(1,'#CD853F');
  } else {
    grad = ctx.createLinearGradient(0,0,1280,800);
    grad.addColorStop(0,'#1a237e');
    grad.addColorStop(1,'#3949ab');
  }
  
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,1280,800);

  // Add Islamic pattern overlay
  ctx.globalAlpha = 0.1;
  for(let i = 0; i < 5; i++){
    for(let j = 0; j < 4; j++){
      const x = (i * 256) + 128;
      const y = (j * 200) + 100;
      
      ctx.beginPath();
      ctx.arc(x, y, 60, 0, Math.PI * 2);
      ctx.strokeStyle = '#C9A84C';
      ctx.lineWidth = 3;
      ctx.stroke();
      
      // Inner circle
      ctx.beginPath();
      ctx.arc(x, y, 30, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;

  ctx.textAlign='center';

  // Arabic text
  ctx.fillStyle='#E8C97A';
  ctx.font="bold 70px Amiri";
  const arabicText = eidType === 'fitr' ? 'عيد مبارك' : 'عيد الأضحى';
  ctx.fillText(arabicText,640,200);

  // Main title
  ctx.fillStyle='#C9A84C';
  ctx.font="bold 100px Cairo";
  const titleText = eidType === 'fitr' ? 'Eid ul-Fitr' : 'Eid ul-Adha';
  ctx.fillText(titleText,640,340);

  // Subtitle
  ctx.fillStyle='#E8C97A';
  ctx.font="bold 50px Amiri";
  ctx.fillText("MUBARAK",640,420);

  // Recipient name
  ctx.fillStyle='white';
  ctx.font="bold 50px Tajawal";
  ctx.fillText(document.getElementById('name').value,640,500);

  // Message with text wrapping
  ctx.font="bold 35px Tajawal";
  wrap(ctx, document.getElementById('msg').value,640,560,900,45);

  return canvas;
}

function wrap(ctx,text,x,y,maxWidth,lineHeight){
  const words=text.split(" ");
  let line="";
  let ty=y;

  for(let i=0;i<words.length;i++){
    let test=line+words[i]+" ";
    if(ctx.measureText(test).width>maxWidth && i>0){
      ctx.fillText(line,x,ty);
      line=words[i]+" ";
      ty+=lineHeight;
    }else{
      line=test;
    }
  }
  ctx.fillText(line,x,ty);
}

/* Download - Enhanced for social media compatibility */
async function download(){
  try {
    const canvas = await render();
    
    // Convert canvas to blob
    const blob = await new Promise((resolve) => {
      canvas.toBlob(resolve, 'image/png', 1.0);
    });
    
    if (!blob) {
      throw new Error('Failed to create image blob');
    }

    const eidType = document.getElementById('eidType').value;
    const filename = `eid-${eidType}-card.png`;
    
    // Method 1: Direct download with modern browsers
    if (navigator.msSaveBlob) {
      // IE/Edge
      navigator.msSaveBlob(blob, filename);
      return;
    }
    
    // Method 2: Create object URL and trigger download
    const url = URL.createObjectURL(blob);
    
    // Create download link
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.style.display = 'none';
    
    // Add to DOM, trigger click, then cleanup
    document.body.appendChild(a);
    
    // Multiple click attempts for different browser behaviors
    try {
      a.click();
      
      // Fallback for some browsers
      setTimeout(() => {
        if (a.dispatchEvent) {
          const event = new MouseEvent('click', {
            view: window,
            bubbles: true,
            cancelable: true
          });
          a.dispatchEvent(event);
        }
      }, 100);
      
    } catch (e) {
      console.error('Click failed:', e);
    }
    
    // Cleanup
    setTimeout(() => {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 1000);
    
    // Method 3: Fallback - open in new tab if download fails
    setTimeout(() => {
      if (blob && !document.hidden) {
        const fallbackUrl = URL.createObjectURL(blob);
        const w = window.open(fallbackUrl, '_blank');
        if (!w) {
          // If popup blocked, show message
          showDownloadFallback(blob, filename);
        } else {
          setTimeout(() => URL.revokeObjectURL(fallbackUrl), 5000);
        }
      }
    }, 2000);
    
  } catch (error) {
    console.error('Download failed:', error);
    showDownloadError();
  }
}

/* Direct Image Display - Works on Instagram and social media */
async function showImageDirectly() {
  try {
    const canvas = await render();
    const imageUrl = canvas.toDataURL('image/png', 1.0);
    const eidType = document.getElementById('eidType').value;
    const filename = `eid-${eidType}-card.png`;
    
    // Create full-screen image display
    const imageModal = document.createElement('div');
    imageModal.style.cssText = `
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 99999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    `;
    
    imageModal.innerHTML = `
      <div style="text-align: center; color: white; margin-bottom: 20px;">
        <h2 style="margin: 0 0 10px 0; color: #C9A84C;">Your Eid Card is Ready!</h2>
        <p style="margin: 0; font-size: 16px; opacity: 0.8;">Press and hold on mobile or right-click on desktop to save</p>
        <p style="margin: 5px 0; font-size: 14px; opacity: 0.6;">Filename: ${filename}</p>
      </div>
      <img src="${imageUrl}" style="max-width: 90%; max-height: 70%; border: 3px solid #C9A84C; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);" />
      <div style="margin-top: 20px; text-align: center;">
        <button onclick="this.parentElement.parentElement.remove()" style="background: #C9A84C; color: #0D2818; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px;">Close</button>
      </div>
    `;
    
    document.body.appendChild(imageModal);
    
    // Auto-remove after 10 seconds to prevent stuck modals
    setTimeout(() => {
      if (imageModal.parentElement) {
        imageModal.remove();
      }
    }, 10000);
    
  } catch (error) {
    console.error('Failed to display image:', error);
    showDownloadError();
  }
}

/* Copy to Clipboard - Modern approach */
async function copyImageToClipboard() {
  try {
    const canvas = await render();
    
    // Try modern clipboard API first
    if (navigator.clipboard && navigator.clipboard.write) {
      canvas.toBlob(async (blob) => {
        try {
          await navigator.clipboard.write([
            new ClipboardItem({ 'image/png': blob })
          ]);
          showSuccessMessage('Image copied to clipboard!');
        } catch (err) {
          console.log('Clipboard API failed, trying fallback...');
          copyImageFallback(canvas);
        }
      });
    } else {
      copyImageFallback(canvas);
    }
  } catch (error) {
    console.error('Copy failed:', error);
    showDownloadError();
  }
}

/* Fallback copy method */
function copyImageFallback(canvas) {
  try {
    // Create a temporary image and select it
    const tempImg = document.createElement('img');
    tempImg.src = canvas.toDataURL();
    tempImg.style.position = 'absolute';
    tempImg.style.left = '-9999px';
    document.body.appendChild(tempImg);
    
    const range = document.createRange();
    range.selectNode(tempImg);
    const selection = window.getSelection();
    selection.removeAllRanges();
    selection.addRange(range);
    
    try {
      document.execCommand('copy');
      showSuccessMessage('Image copied! You can now paste it anywhere.');
    } catch (err) {
      showDownloadError();
    }
    
    selection.removeAllRanges();
    document.body.removeChild(tempImg);
  } catch (error) {
    showDownloadError();
  }
}

/* Success message */
function showSuccessMessage(message) {
  const successMsg = document.createElement('div');
  successMsg.style.cssText = `
    position: fixed;
    top: 20px;
    right: 20px;
    background: #4CAF50;
    color: white;
    padding: 15px;
    border-radius: 8px;
    z-index: 10000;
    max-width: 300px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  `;
  successMsg.innerHTML = `
    <strong>✅ Success!</strong><br>
    ${message}
    <button onclick="this.parentElement.remove()" style="float: right; background: none; border: none; color: white; cursor: pointer; font-size: 18px;">×</button>
  `;
  
  document.body.appendChild(successMsg);
  setTimeout(() => successMsg.remove(), 4000);
}
function showDownloadFallback(blob, filename) {
  // Create a temporary download area
  const downloadArea = document.createElement('div');
  downloadArea.style.cssText = `
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    z-index: 10000;
    text-align: center;
    color: #333;
  `;
  
  downloadArea.innerHTML = `
    <h3 style="margin: 0 0 15px 0; color: #0D2818;">Download Your Card</h3>
    <p style="margin: 0 0 15px 0;">Right-click the image below and save as "${filename}"</p>
    <img src="${URL.createObjectURL(blob)}" style="max-width: 300px; border: 2px solid #C9A84C; border-radius: 8px;">
    <br><br>
    <button onclick="this.parentElement.remove()" style="background: #C9A84C; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Close</button>
  `;
  
  document.body.appendChild(downloadArea);
}

function showDownloadError() {
  const errorMsg = document.createElement('div');
  errorMsg.style.cssText = `
    position: fixed;
    top: 20px;
    right: 20px;
    background: #ff4444;
    color: white;
    padding: 15px;
    border-radius: 8px;
    z-index: 10000;
    max-width: 300px;
  `;
  errorMsg.innerHTML = `
    <strong>Download Failed</strong><br>
    Please try right-clicking the card and selecting "Save Image As"
    <button onclick="this.parentElement.remove()" style="float: right; background: none; border: none; color: white; cursor: pointer;">×</button>
  `;
  
  document.body.appendChild(errorMsg);
  setTimeout(() => errorMsg.remove(), 5000);
}

// Initialize on load
update();
</script>

</body>
</html>
