<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak Card Maker</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&family=Cormorant+Garamond&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cormorant Garamond',serif;
  background:#0D2818;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
  color:white;
}

/* Controls */
.controls{
  max-width:500px;
  width:100%;
  margin-bottom:20px;
}

input, textarea{
  width:100%;
  margin:8px 0;
  padding:10px;
  border-radius:6px;
  border:none;
}

button{
  width:100%;
  padding:14px;
  background:#C9A84C;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

/* Card */
#card{
  width:640px;
  max-width:100%;
  height:400px;
  border-radius:16px;
  background:linear-gradient(135deg,#0d3b2e,#1e7a5e);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

.title{
  font-family:'Amiri',serif;
  font-size:48px;
  color:#C9A84C;
}

.sub{
  font-family:'Amiri',serif;
  font-size:24px;
  color:#E8C97A;
}

.name{
  margin-top:10px;
  font-size:24px;
}

.msg{
  margin-top:10px;
  font-style:italic;
}

</style>
</head>

<body>

<div class="controls">
  <input id="name" value="Dear Fatima" oninput="update()">
  <textarea id="msg" oninput="update()">May this Eid bring peace and joy!</textarea>
  <button onclick="download()">⬇ Download Card</button>
</div>

<div id="card">
  <div class="sub">عيد مبارك</div>
  <div class="title">Eid ul-Fitr</div>
  <div class="sub">MUBARAK</div>
  <div class="name" id="cname">Dear Fatima</div>
  <div class="msg" id="cmsg">May this Eid bring peace and joy!</div>
</div>

<script>
function update(){
  document.getElementById('cname').innerText =
    document.getElementById('name').value;

  document.getElementById('cmsg').innerText =
    document.getElementById('msg').value;
}

/* Canvas renderer */
async function render(){
  const canvas=document.createElement('canvas');
  canvas.width=1280;
  canvas.height=800;
  const ctx=canvas.getContext('2d');

  // background
  const grad=ctx.createLinearGradient(0,0,1280,800);
  grad.addColorStop(0,'#0d3b2e');
  grad.addColorStop(1,'#1e7a5e');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,1280,800);

  ctx.textAlign='center';

  ctx.fillStyle='#E8C97A';
  ctx.font="60px Amiri";
  ctx.fillText("عيد مبارك",640,200);

  ctx.fillStyle='#C9A84C';
  ctx.font="90px Amiri";
  ctx.fillText("Eid ul-Fitr",640,320);

  ctx.fillStyle='#E8C97A';
  ctx.font="40px Amiri";
  ctx.fillText("MUBARAK",640,400);

  ctx.fillStyle='white';
  ctx.font="40px serif";
  ctx.fillText(document.getElementById('name').value,640,480);

  ctx.font="28px serif";
  wrap(ctx, document.getElementById('msg').value,640,540,800,40);

  return canvas;
}

function wrap(ctx,text,x,y,maxWidth,lineHeight){
  const words=text.split(" ");
  let line="";
  let ty=y;

  for(let i=0;i<words.length;i++){
    let test=line+words[i]+" ";
    if(ctx.measureText(test).width>maxWidth && i>0){
      ctx.fillText(line,x,ty);
      line=words[i]+" ";
      ty+=lineHeight;
    }else{
      line=test;
    }
  }
  ctx.fillText(line,x,ty);
}

/* Download */
async function download(){
  const canvas=await render();

  canvas.toBlob(blob=>{
    const url=URL.createObjectURL(blob);

    const a=document.createElement("a");
    a.href=url;
    a.download="eid-card.png";

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    URL.revokeObjectURL(url);
  });
}
</script>

</body>
</html>
